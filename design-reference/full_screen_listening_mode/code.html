<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>HearBoost - Full Screen Listening</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&amp;family=Roboto:wght@400;500&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-background": "#d9e3f7",
                        "primary-fixed": "#5ffbd6",
                        "inverse-on-surface": "#273140",
                        "on-error-container": "#ffdad6",
                        "on-tertiary": "#003918",
                        "tertiary": "#57e886",
                        "outline": "#85948e",
                        "primary-container": "#00c9a7",
                        "tertiary-fixed": "#6ffe99",
                        "tertiary-fixed-dim": "#4fe080",
                        "surface-container-high": "#212a39",
                        "error-container": "#93000a",
                        "surface-tint": "#38debb",
                        "on-tertiary-fixed-variant": "#005226",
                        "inverse-surface": "#d9e3f7",
                        "on-primary-container": "#004e40",
                        "surface-container-lowest": "#050e1c",
                        "surface-container-low": "#121c2a",
                        "on-secondary": "#452b00",
                        "on-secondary-container": "#4f3100",
                        "surface": "#0a1422",
                        "outline-variant": "#3c4a45",
                        "on-primary-fixed": "#002019",
                        "on-tertiary-container": "#005024",
                        "background": "#0a1422",
                        "primary": "#44e5c2",
                        "on-secondary-fixed": "#291800",
                        "on-secondary-fixed-variant": "#633f00",
                        "tertiary-container": "#34cb6d",
                        "on-primary-fixed-variant": "#005142",
                        "inverse-primary": "#006b58",
                        "on-surface": "#d9e3f7",
                        "on-surface-variant": "#bacac3",
                        "surface-dim": "#0a1422",
                        "surface-variant": "#2c3545",
                        "surface-container-highest": "#2c3545",
                        "surface-bright": "#303a49",
                        "secondary-container": "#dc9100",
                        "on-primary": "#00382d",
                        "secondary-fixed": "#ffddb4",
                        "secondary-fixed-dim": "#ffb955",
                        "surface-container": "#16202f",
                        "on-error": "#690005",
                        "primary-fixed-dim": "#38debb",
                        "secondary": "#ffb955",
                        "error": "#ffb4ab",
                        "on-tertiary-fixed": "#00210b"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "base": "8px",
                        "xs": "4px",
                        "margin-mobile": "24px",
                        "gutter": "16px",
                        "touch-target": "56px",
                        "sm": "12px",
                        "md": "24px",
                        "lg": "40px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Poppins"],
                        "button": ["Poppins"],
                        "body-md": ["Roboto"],
                        "headline-md": ["Poppins"],
                        "display-lg": ["Poppins"],
                        "body-lg": ["Roboto"],
                        "label-lg": ["Roboto"]
                    },
                    "fontSize": {
                        "headline-lg": ["28px", {"lineHeight": "36px", "fontWeight": "600"}],
                        "button": ["18px", {"lineHeight": "24px", "letterSpacing": "0.02em", "fontWeight": "600"}],
                        "body-md": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "display-lg": ["36px", {"lineHeight": "44px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-lg": ["20px", {"lineHeight": "30px", "fontWeight": "400"}],
                        "label-lg": ["16px", {"lineHeight": "24px", "letterSpacing": "0.01em", "fontWeight": "500"}]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        .waveform-bar {
            animation: bounce 1.2s ease-in-out infinite alternate;
        }
        
        @keyframes bounce {
            from { height: 20%; opacity: 0.6; }
            to { height: 100%; opacity: 1; }
        }

        .pulse-text {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Custom Volume Slider */
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 40px;
            width: 40px;
            border-radius: 50%;
            background: #F5A623; /* Warm Amber thumb from guidance */
            cursor: pointer;
            border: 2px solid #ffffff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            margin-top: -14px;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 12px;
            cursor: pointer;
            background: #0F2035;
            border-radius: 6px;
        }

        /* Hide Shells on this screen per mandate */
        #bottom-nav, #top-app-bar { display: none !important; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-[#07111F] text-on-background min-h-screen flex flex-col font-body-md overflow-hidden">
<!-- Screen 05: Full Screen Listening Mode -->
<main class="flex-1 flex flex-col items-center justify-between px-margin-mobile py-lg">
<!-- Top Section: Exit Action -->
<header class="w-full flex justify-between items-center">
<button class="flex items-center gap-2 px-4 py-2 hover:bg-surface-variant transition-colors rounded-full text-on-surface-variant font-label-lg-mobile text-label-lg-mobile" onclick="window.history.back()">
<span class="material-symbols-outlined">close</span>
<span>Exit</span>
</button>
<div class="flex items-center gap-2 px-4 py-2 bg-surface-container rounded-full border border-outline-variant">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">headphones</span>
<span class="font-label-lg-mobile text-label-lg-mobile">Sony WH-1000</span>
<span class="w-2 h-2 rounded-full bg-primary animate-pulse"></span>
</div>
</header>
<!-- Center Section: Visualizer & Status -->
<section class="flex flex-col items-center gap-12 w-full">
<!-- Large Waveform Visualizer -->
<div class="w-full h-[160px] flex items-end justify-center gap-[6px]">
<!-- Teal Bars (Using primary #44e5c2 or container #00c9a7) -->
<div class="waveform-bar w-2 bg-primary-container rounded-full" style="animation-delay: 0.1s; height: 40%;"></div>
<div class="waveform-bar w-2 bg-primary-container rounded-full" style="animation-delay: 0.3s; height: 70%;"></div>
<div class="waveform-bar w-2 bg-primary-container rounded-full" style="animation-delay: 0.2s; height: 50%;"></div>
<div class="waveform-bar w-2 bg-primary-container rounded-full" style="animation-delay: 0.5s; height: 90%;"></div>
<div class="waveform-bar w-2 bg-primary-container rounded-full" style="animation-delay: 0.4s; height: 60%;"></div>
<div class="waveform-bar w-2 bg-primary-container rounded-full" style="animation-delay: 0.7s; height: 100%;"></div>
<div class="waveform-bar w-2 bg-primary-container rounded-full" style="animation-delay: 0.6s; height: 80%;"></div>
<div class="waveform-bar w-2 bg-primary-container rounded-full" style="animation-delay: 0.8s; height: 55%;"></div>
<div class="waveform-bar w-2 bg-primary-container rounded-full" style="animation-delay: 1.0s; height: 75%;"></div>
<div class="waveform-bar w-2 bg-primary-container rounded-full" style="animation-delay: 0.9s; height: 45%;"></div>
<div class="waveform-bar w-2 bg-primary-container rounded-full" style="animation-delay: 1.2s; height: 65%;"></div>
<div class="waveform-bar w-2 bg-primary-container rounded-full" style="animation-delay: 1.1s; height: 95%;"></div>
<div class="waveform-bar w-2 bg-primary-container rounded-full" style="animation-delay: 0.2s; height: 35%;"></div>
<div class="waveform-bar w-2 bg-primary-container rounded-full" style="animation-delay: 0.4s; height: 60%;"></div>
<div class="waveform-bar w-2 bg-primary-container rounded-full" style="animation-delay: 0.6s; height: 80%;"></div>
</div>
<div class="text-center">
<h1 class="font-headline-md text-headline-md text-primary pulse-text tracking-wide">Listening...</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-2">Frequency optimization active</p>
</div>
</section>
<!-- Bottom Section: Controls -->
<section class="w-full flex flex-col gap-10 pb-lg">
<!-- Extra Large Volume Slider -->
<div class="w-full px-4">
<div class="flex justify-between mb-4">
<span class="material-symbols-outlined text-on-surface-variant">volume_down</span>
<span class="font-label-lg-mobile text-label-lg-mobile text-on-surface-variant">Volume Level</span>
<span class="material-symbols-outlined text-on-surface-variant">volume_up</span>
</div>
<input class="w-full h-[12px] bg-[#0F2035] rounded-lg appearance-none cursor-pointer" max="100" min="0" type="range" value="65"/>
</div>
<!-- Large ⏸ Pause Button -->
<div class="w-full flex justify-center">
<button class="w-full max-w-sm h-touch-target bg-primary-container text-on-primary-container rounded-xl flex items-center justify-center gap-3 font-button text-button shadow-lg active:scale-95 transition-transform duration-150" style="height: 72px;">
<span class="material-symbols-outlined text-[32px]" style="font-variation-settings: 'FILL' 1;">pause</span>
<span>Pause</span>
</button>
</div>
</section>
</main>
<!-- Visual Polish: Subtle Background Noise Texture -->
<div class="fixed inset-0 pointer-events-none opacity-[0.03] mix-blend-overlay bg-[url('https://www.transparenttextures.com/patterns/stardust.png')]"></div>
<script>
        // Micro-interaction for the slider
        const slider = document.querySelector('input[type=range]');
        slider.addEventListener('input', function() {
            // Optional: update visual state based on volume
            const val = this.value;
            const primaryColor = '#44e5c2';
            const backgroundColor = '#0F2035';
            const percentage = (val - this.min) / (this.max - this.min) * 100;
            this.style.background = `linear-gradient(to right, ${primaryColor} 0%, ${primaryColor} ${percentage}%, ${backgroundColor} ${percentage}%, ${backgroundColor} 100%)`;
        });
        
        // Initial call to set visual state
        slider.dispatchEvent(new Event('input'));
    </script>
</body></html>
