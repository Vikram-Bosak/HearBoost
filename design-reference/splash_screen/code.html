<style>
        body {
            background-color: #07111F;
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;
        }

        @keyframes soundWave {
            0%, 100% { opacity: 0.3; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.1); }
        }

        .arc-1 { animation: soundWave 2s infinite ease-in-out; }
        .arc-2 { animation: soundWave 2s infinite ease-in-out 0.3s; }
        .arc-3 { animation: soundWave 2s infinite ease-in-out 0.6s; }

        .progress-bar-container {
            width: 80%;
            height: 4px;
            background-color: #1A3352;
            border-radius: 2px;
            position: absolute;
            bottom: 15%;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background-color: #00C9A7;
            width: 0%;
            transition: width 3s ease-in-out;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="dark bg-[#07111F]">
<!-- Main Branding Cluster -->
<div class="flex flex-col items-center justify-center space-y-6 text-center animate-fade-in">
<!-- Animated Logo: Ear with Sound Arcs -->
<div class="relative w-32 h-32 flex items-center justify-center">
<!-- Central Ear Icon -->
<span class="material-symbols-outlined text-[64px] text-primary" data-icon="hearing" style="font-variation-settings: 'FILL' 1;">
                hearing
            </span>
<!-- Sound Arc Lines (Absolute positioned around the ear) -->
<div class="absolute inset-0 flex items-center justify-center">
<!-- Arc 1 (Inner) -->
<div class="arc-1 border-2 border-primary rounded-full w-24 h-24 absolute opacity-20"></div>
<!-- Arc 2 (Middle) -->
<div class="arc-2 border-2 border-primary rounded-full w-32 h-32 absolute opacity-10"></div>
<!-- Arc 3 (Outer) -->
<div class="arc-3 border-2 border-primary rounded-full w-40 h-40 absolute opacity-5"></div>
</div>
</div>
<!-- Typography Section -->
<div class="space-y-2 mt-8">
<!-- HearBoost Label - Exact match from JSON logic but Splash scale -->
<h1 class="text-[#EDF4FB] font-headline-lg-mobile text-[32px] font-bold tracking-tight">
                HearBoost
            </h1>
<p class="text-[#7A9AB5] font-body-md text-[16px]">
                Hear Every Word, Clearly
            </p>
</div>
</div>
<!-- Background Atmospheric Effect -->
<div class="absolute inset-0 pointer-events-none z-[-1]">
<!-- Subtle gradient glow behind logo -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-primary/5 rounded-full blur-[100px]"></div>
</div>
<!-- Transactional Screen: Navigation Suppressed per "Semantic Shell" mandate -->
<!-- Loading bar: Bottom 20% of screen -->
<div class="progress-bar-container">
<div class="progress-bar-fill" id="progressFill"></div>
</div>
<script>
        // Progress bar simulation for the splash moment
        window.addEventListener('load', () => {
            const fill = document.getElementById('progressFill');
            setTimeout(() => {
                fill.style.width = '100%';
            }, 100);
        });

        // Micro-interaction for logo interaction if tapped
        document.querySelector('.relative.w-32.h-32').addEventListener('click', function() {
            this.classList.add('scale-95');
            setTimeout(() => this.classList.remove('scale-95'), 150);
        });
    </script>
<!-- Detailed Background Image for Depth (Atmospheric) -->
