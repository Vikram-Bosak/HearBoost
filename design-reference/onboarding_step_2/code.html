<style>
        body {
            background-color: #07111F;
            color: #d9e3f7;
            -webkit-font-smoothing: antialiased;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .step-dot {
            width: 8px;
            height: 8px;
            border-radius: 9999px;
            background-color: #3c4a45;
            transition: all 0.3s ease;
        }
        .step-dot.active {
            width: 24px;
            background-color: #00c9a7;
        }
        .audio-wave-pulse {
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 0.4; }
            100% { transform: scale(0.95); opacity: 0.8; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col min-h-screen">
<!-- Top Navigation (Shell suppressed for Onboarding) -->
<header class="w-full px-margin-mobile h-touch-target flex items-center justify-center">
<div class="flex items-center gap-2">
<div class="step-dot"></div>
<div class="step-dot active"></div>
<div class="step-dot"></div>
</div>
</header>
<main class="flex-grow flex flex-col items-center px-margin-mobile pt-lg pb-lg max-w-md mx-auto text-center">
<!-- Hero Illustration Area -->
<div class="relative w-full aspect-square max-w-[280px] mb-lg flex items-center justify-center">
<!-- Decorative Background Glow -->
<div class="absolute inset-0 bg-primary-container opacity-10 blur-3xl rounded-full audio-wave-pulse"></div>
<!-- Icon Cluster -->
<div class="relative z-10 flex items-center gap-gutter">
<div class="bg-surface-container-high p-8 rounded-lg border-2 border-outline-variant flex flex-col items-center gap-4 shadow-xl">
<span class="material-symbols-outlined text-[64px] text-primary" style="font-variation-settings: 'opsz' 48;">headphones</span>
<span class="font-label-lg text-label-lg text-on-surface-variant">Wired</span>
</div>
<div class="bg-surface-container-high p-8 rounded-lg border-2 border-primary-container flex flex-col items-center gap-4 shadow-xl">
<span class="material-symbols-outlined text-[64px] text-primary" style="font-variation-settings: 'opsz' 48, 'FILL' 1;">bluetooth_audio</span>
<span class="font-label-lg text-label-lg text-primary">Wireless</span>
</div>
</div>
</div>
<!-- Text Content -->
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-sm">
            Connect Your Headphones
        </h1>
<p class="font-body-md text-body-md text-on-surface-variant mb-lg">
            Works with: Any wired earphones, Bluetooth headphones, Hearing loop devices. Plug in or pair your headphones now.
        </p>
<!-- Connectivity Badge (Optional Detail for Silver Gen clarity) -->
<div class="w-full bg-surface-container-low border border-outline-variant p-md rounded-lg mb-lg flex items-center gap-md text-left">
<div class="bg-primary-container/20 p-sm rounded-full">
<span class="material-symbols-outlined text-primary">hearing</span>
</div>
<div>
<p class="font-label-lg text-label-lg text-on-surface">Universal Compatibility</p>
<p class="text-[14px] text-on-surface-variant">Optimized for standard audio output.</p>
</div>
</div>
</main>
<!-- Fixed Action Bar -->
<footer class="w-full px-margin-mobile pb-lg mt-auto max-w-md mx-auto">
<div class="flex flex-col gap-md">
<button class="w-full h-touch-target bg-primary-container text-on-primary-container font-button text-button rounded-full active:scale-95 transition-transform duration-150 shadow-lg">
                Continue
            </button>
<button class="w-full py-4 text-primary-fixed font-button text-button hover:underline focus:outline-none">
                Already done
            </button>
</div>
</footer>
<!-- Micro-interaction Script -->

        document.querySelector('button.text-primary-fixed').addEventListener('click', () => {

            console.log("Skipping to dashboard...");
        });
