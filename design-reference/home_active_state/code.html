<script>
        // Waveform Generation and Animation
        const waveform = document.getElementById('waveform');
        const barCount = 32;
        const bars = [];

        for (let i = 0; i < barCount; i++) {
            const bar = document.createElement('div');
            bar.className = 'waveform-bar w-1 bg-primary-container rounded-full';
            // Create a nice parabolic curve for default state
            const distFromCenter = Math.abs(i - barCount/2) / (barCount/2);
            const height = 20 + (1 - distFromCenter) * 40;
            bar.style.height = `${height}%`;
            waveform.appendChild(bar);
            bars.push(bar);
        }

        function animateWaveform() {
            bars.forEach((bar, i) => {
                const randomHeight = 15 + Math.random() * 85;
                // Add some rhythm based on index
                const sinValue = Math.sin(Date.now() / 200 + i / 2);
                const modulatedHeight = randomHeight * (0.5 + 0.5 * sinValue);
                bar.style.height = `${modulatedHeight}%`;
            });
            requestAnimationFrame(animateWaveform);
        }

        animateWaveform();

        // Volume slider background update
        const slider = document.querySelector('.custom-slider');
        const fillBar = slider.nextElementSibling;
        slider.addEventListener('input', (e) => {
            const val = e.target.value;
            fillBar.style.width = `${val}%`;
            document.querySelector('.text-primary-fixed').innerText = `${val}%`;
        });
    </script>
