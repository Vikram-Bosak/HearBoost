<style>
        body {
            background-color: #07111F;
            color: #d9e3f7;
            -webkit-tap-highlight-color: transparent;
        }
        .mic-glow {
            box-shadow: 0 0 40px rgba(0, 201, 167, 0.2);
        }
        .stepper-dot {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .active-dot {
            width: 24px;
        }
        .pulse-animation {
            animation: pulse-ring 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.95); opacity: 0.5; }
            50% { transform: scale(1.05); opacity: 0.3; }
            100% { transform: scale(0.95); opacity: 0.5; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="flex flex-col min-h-screen font-body-md overflow-hidden">
<!-- Top Navigation (Shell logic: Suppressed for Onboarding) -->
<!-- Progress Indicator -->
<header class="w-full pt-12 pb-8 flex justify-center items-center px-margin-mobile">
<div class="flex gap-2">
<div class="stepper-dot h-2 w-2 rounded-full bg-surface-variant"></div>
<div class="stepper-dot h-2 w-2 rounded-full bg-surface-variant"></div>
<div class="stepper-dot h-2 active-dot rounded-full bg-primary-container"></div>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col items-center justify-center px-margin-mobile text-center relative">
<!-- Background Ambient Shader / Visual Depth -->
<div class="absolute inset-0 z-0 pointer-events-none opacity-20">

</div>
<!-- Hero Section -->
<div class="relative z-10 mb-lg">
<div class="relative w-40 h-40 flex items-center justify-center">
<!-- Decorative concentric rings -->
<div class="absolute inset-0 rounded-full bg-primary-container/10 pulse-animation scale-125"></div>
<div class="absolute inset-0 rounded-full bg-primary-container/5 pulse-animation scale-150"></div>
<!-- Icon Container -->
<div class="w-24 h-24 bg-surface-container-high rounded-full flex items-center justify-center mic-glow border border-primary-container/20">
<span class="material-symbols-outlined text-[80px] text-primary-container leading-none" data-icon="mic" style="font-variation-settings: 'FILL' 1;">mic</span>
</div>
</div>
</div>
<!-- Text Content -->
<div class="z-10 max-w-sm">
<h1 class="font-headline-md text-headline-md text-on-surface mb-md">
                Microphone Access
            </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant leading-relaxed">
                HearBoost needs your microphone to capture nearby speech. Your audio is processed entirely on your device. Nothing is recorded.
            </p>
</div>
</main>
<!-- Fixed Action Bar -->
<footer class="w-full p-margin-mobile pb-12 z-20 flex flex-col items-center gap-md">
<!-- Primary Button -->
<button class="w-full max-w-md h-touch-target bg-primary-container text-on-primary-container font-button text-button rounded-full flex items-center justify-center active:scale-95 transition-transform duration-150 shadow-lg shadow-primary-container/20" onclick="requestPermission()">
            Allow Microphone
        </button>
<!-- Secondary Link -->
<button class="font-label-lg text-label-lg text-on-surface-variant hover:text-primary transition-colors py-2">
            Skip for now
        </button>
</footer>
<script>
        // Simple micro-interaction for the button
        function requestPermission() {
            const btn = event.currentTarget;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin" data-icon="progress_activity">progress_activity</span>';
            
            // Artificial delay to simulate OS dialog or processing
            setTimeout(() => {
                btn.innerHTML = 'Microphone Enabled';
                btn.classList.replace('bg-primary-container', 'bg-tertiary-container');
                btn.classList.replace('text-on-primary-container', 'text-on-tertiary-container');
                
                // Add a small success confetti/feedback effect (abstracted)
                console.log("Permission Granted");
            }, 800);
        }

        // Material Icons transcription fix for interaction elements
        document.addEventListener('DOMContentLoaded', () => {
            const icons = document.querySelectorAll('.material-symbols-outlined');
            icons.forEach(icon => {
                if(icon.getAttribute('data-icon')) {
                    icon.textContent = icon.getAttribute('data-icon');
                }
            });
        });
    </script>
</body></html>
